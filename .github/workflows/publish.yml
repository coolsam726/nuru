name: Publish & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  deploy:
    name: Deploy to coolsam.pythonanywhere.com
    needs: publish
    runs-on: ubuntu-latest
    steps:
      # ── 1. Wait for PyPI to propagate the new version ─────────────────
      - name: Wait for PyPI propagation
        run: sleep 60

      # ── 2. Open a PA bash console, run pip install, poll for completion
      #       (free PA accounts have no SSH — we use the Consoles API)
      - name: Upgrade nuru on PythonAnywhere
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_VENV: ${{ secrets.PA_VIRTUALENV }}
        run: |
          python3 - <<'EOF'
          import os, time, urllib.request, urllib.error, json, sys

          TIMEOUT = 30  # seconds for each HTTP request

          token = os.environ["PA_TOKEN"]
          venv  = os.environ.get("PA_VENV", "")
          base  = "https://www.pythonanywhere.com/api/v0/user/coolsam"
          hdrs  = {"Authorization": f"Token {token}", "Content-Type": "application/json"}

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(f"{base}{path}", data=data, headers=hdrs, method=method)
              with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                  raw = r.read()
                  return json.loads(raw) if raw.strip() else {}

          # Create a bash console
          console = api("POST", "/consoles/", {"executable": "bash", "arguments": ""})
          cid = console["id"]
          print(f"Console {cid} created", flush=True)

          success = False
          try:
              # Poll get_latest_output until the console is alive (PA requires this
              # "attach" step before it will accept send_input; 412 otherwise)
              for _ in range(20):
                  time.sleep(3)
                  try:
                      out = api("GET", f"/consoles/{cid}/get_latest_output/")
                      print(f"Console ready: {out.get('output', '').strip()!r}", flush=True)
                      break
                  except (urllib.error.HTTPError, urllib.error.URLError) as e:
                      print(f"Waiting for console... ({e})", flush=True)
              else:
                  print("Console never became ready", file=sys.stderr)
                  sys.exit(1)

              # Send the install command
              activate = f"source {venv}/bin/activate && " if venv else ""
              cmd = f"{activate}pip install --upgrade --quiet nuru && echo '__DONE__'\n"
              api("POST", f"/consoles/{cid}/send_input/", {"input": cmd})

              # Poll up to 3 minutes for completion marker
              for _ in range(36):
                  time.sleep(5)
                  out = api("GET", f"/consoles/{cid}/get_latest_output/")
                  output = out.get("output", "")
                  if output:
                      print(output, end="", flush=True)
                  if "__DONE__" in output:
                      print("\nInstall succeeded.", flush=True)
                      success = True
                      break
              else:
                  print("Timed out waiting for pip install", file=sys.stderr)
          finally:
              # Always attempt to tear down the console, even on failure
              try:
                  api("DELETE", f"/consoles/{cid}/")
                  print(f"Console {cid} deleted.", flush=True)
              except (urllib.error.HTTPError, urllib.error.URLError) as e:
                  print(f"Warning: could not delete console {cid}: {e}", file=sys.stderr)

          if not success:
              sys.exit(1)
          EOF

      # ── 3. Reload the web app via the PythonAnywhere API ──────────────
      - name: Reload web app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/coolsam/webapps/coolsam.pythonanywhere.com/reload/)
          echo "Reload status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

