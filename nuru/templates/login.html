<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — {{ panel_title }}</title>
  <script>
    (function() {
      var t = localStorage.getItem('ap-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }</script>
  <script>
    (function populateTailwindColorVars() {
      var families = ['slate', 'gray', 'zinc', 'neutral', 'stone', 'red', 'orange', 'amber', 'yellow', 'lime', 'green', 'emerald', 'teal', 'cyan', 'sky', 'blue', 'indigo', 'violet', 'purple', 'fuchsia', 'pink', 'rose'];
      var stops = [50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950];
      var root = document.documentElement;
      var probe = document.createElement('div');
      probe.style.position = 'absolute';
      probe.style.left = '-9999px';
      probe.style.top = '-9999px';
      probe.style.width = '0';
      probe.style.height = '0';
      probe.style.overflow = 'hidden';
      probe.style.pointerEvents = 'none';
      probe.style.opacity = '0';

      function run() {
        document.body.appendChild(probe);
        for (var i = 0; i < families.length; i++) {
          for (var j = 0; j < stops.length; j++) {
            var family = families[i];
            var stop = stops[j];
            probe.className = 'text-' + family + '-' + stop;
            var color = getComputedStyle(probe).color;
            if (color) {
              root.style.setProperty('--color-' + family + '-' + stop, color);
            }
          }
        }
        document.body.removeChild(probe);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run, { once: true });
      } else {
        run();
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
{{ palette_css }}
    }
    .bg-primary { background-color: var(--color-primary-500); }
    .ring-primary { --tw-ring-color: var(--color-primary-500); }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center p-4 transition-colors">
  <div class="hidden text-slate-50 text-slate-100 text-slate-200 text-slate-300 text-slate-400 text-slate-500 text-slate-600 text-slate-700 text-slate-800 text-slate-900 text-slate-950 text-gray-50 text-gray-100 text-gray-200 text-gray-300 text-gray-400 text-gray-500 text-gray-600 text-gray-700 text-gray-800 text-gray-900 text-gray-950 text-zinc-50 text-zinc-100 text-zinc-200 text-zinc-300 text-zinc-400 text-zinc-500 text-zinc-600 text-zinc-700 text-zinc-800 text-zinc-900 text-zinc-950 text-neutral-50 text-neutral-100 text-neutral-200 text-neutral-300 text-neutral-400 text-neutral-500 text-neutral-600 text-neutral-700 text-neutral-800 text-neutral-900 text-neutral-950 text-stone-50 text-stone-100 text-stone-200 text-stone-300 text-stone-400 text-stone-500 text-stone-600 text-stone-700 text-stone-800 text-stone-900 text-stone-950 text-red-50 text-red-100 text-red-200 text-red-300 text-red-400 text-red-500 text-red-600 text-red-700 text-red-800 text-red-900 text-red-950 text-orange-50 text-orange-100 text-orange-200 text-orange-300 text-orange-400 text-orange-500 text-orange-600 text-orange-700 text-orange-800 text-orange-900 text-orange-950 text-amber-50 text-amber-100 text-amber-200 text-amber-300 text-amber-400 text-amber-500 text-amber-600 text-amber-700 text-amber-800 text-amber-900 text-amber-950 text-yellow-50 text-yellow-100 text-yellow-200 text-yellow-300 text-yellow-400 text-yellow-500 text-yellow-600 text-yellow-700 text-yellow-800 text-yellow-900 text-yellow-950 text-lime-50 text-lime-100 text-lime-200 text-lime-300 text-lime-400 text-lime-500 text-lime-600 text-lime-700 text-lime-800 text-lime-900 text-lime-950 text-green-50 text-green-100 text-green-200 text-green-300 text-green-400 text-green-500 text-green-600 text-green-700 text-green-800 text-green-900 text-green-950 text-emerald-50 text-emerald-100 text-emerald-200 text-emerald-300 text-emerald-400 text-emerald-500 text-emerald-600 text-emerald-700 text-emerald-800 text-emerald-900 text-emerald-950 text-teal-50 text-teal-100 text-teal-200 text-teal-300 text-teal-400 text-teal-500 text-teal-600 text-teal-700 text-teal-800 text-teal-900 text-teal-950 text-cyan-50 text-cyan-100 text-cyan-200 text-cyan-300 text-cyan-400 text-cyan-500 text-cyan-600 text-cyan-700 text-cyan-800 text-cyan-900 text-cyan-950 text-sky-50 text-sky-100 text-sky-200 text-sky-300 text-sky-400 text-sky-500 text-sky-600 text-sky-700 text-sky-800 text-sky-900 text-sky-950 text-blue-50 text-blue-100 text-blue-200 text-blue-300 text-blue-400 text-blue-500 text-blue-600 text-blue-700 text-blue-800 text-blue-900 text-blue-950 text-indigo-50 text-indigo-100 text-indigo-200 text-indigo-300 text-indigo-400 text-indigo-500 text-indigo-600 text-indigo-700 text-indigo-800 text-indigo-900 text-indigo-950 text-violet-50 text-violet-100 text-violet-200 text-violet-300 text-violet-400 text-violet-500 text-violet-600 text-violet-700 text-violet-800 text-violet-900 text-violet-950 text-purple-50 text-purple-100 text-purple-200 text-purple-300 text-purple-400 text-purple-500 text-purple-600 text-purple-700 text-purple-800 text-purple-900 text-purple-950 text-fuchsia-50 text-fuchsia-100 text-fuchsia-200 text-fuchsia-300 text-fuchsia-400 text-fuchsia-500 text-fuchsia-600 text-fuchsia-700 text-fuchsia-800 text-fuchsia-900 text-fuchsia-950 text-pink-50 text-pink-100 text-pink-200 text-pink-300 text-pink-400 text-pink-500 text-pink-600 text-pink-700 text-pink-800 text-pink-900 text-pink-950 text-rose-50 text-rose-100 text-rose-200 text-rose-300 text-rose-400 text-rose-500 text-rose-600 text-rose-700 text-rose-800 text-rose-900 text-rose-950"></div>

  <!-- Dark mode toggle (top-right) -->
  <button onclick="toggleTheme()"
          class="fixed top-4 right-4 p-2 rounded-lg text-zinc-500 dark:text-zinc-400
                 hover:bg-white dark:hover:bg-zinc-800 transition-colors">
    <!-- Moon: shown in light mode -->
    <svg class="w-4 h-4 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
    <!-- Sun: shown in dark mode -->
    <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
    </svg>
  </button>

  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      {% if logo_url %}
        <img src="{{ logo_url }}" alt="{{ panel_title }}" class="h-10 mx-auto mb-3">
      {% else %}
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary mb-3">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
      {% endif %}
      <h1 class="text-xl font-semibold text-zinc-900 dark:text-zinc-100">Sign in to {{ panel_title }}</h1>
    </div>

    {% if error %}
    <div class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-800
                dark:bg-red-900/30 dark:border-red-700/50 dark:text-red-300
                rounded-lg px-4 py-3 text-sm">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post"
          action="{{ panel_prefix }}/login{% if next %}?next={{ next }}{% endif %}"
          class="bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 p-6 space-y-4 shadow-sm">

      <div>
        <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1.5">Username</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          autocomplete="username"
          class="w-full px-3 py-2 text-sm border border-zinc-200 dark:border-zinc-600
                 rounded-lg bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100
                 placeholder-zinc-400 dark:placeholder-zinc-500
                 focus:outline-none focus:ring-2 ring-primary focus:border-transparent"
          placeholder="your username"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1.5">Password</label>
        <input
          type="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full px-3 py-2 text-sm border border-zinc-200 dark:border-zinc-600
                 rounded-lg bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100
                 placeholder-zinc-400 dark:placeholder-zinc-500
                 focus:outline-none focus:ring-2 ring-primary focus:border-transparent"
          placeholder="••••••••"
        >
      </div>

      <button
        type="submit"
        class="w-full py-2 px-4 text-sm font-medium text-white rounded-lg bg-primary hover:opacity-90 transition-opacity">
        Sign in
      </button>
    </form>

  </div>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('ap-theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('ap-theme', 'dark');
      }
    }
  </script>

</body>
</html>
