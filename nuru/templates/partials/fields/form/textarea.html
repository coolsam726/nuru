<div>
  <label class="block text-sm font-medium text-secondary-700 dark:text-secondary-300 mb-1.5">
    {{ field.get_label() }}
    {% if field.is_required() %}<span class="text-red-500 ml-0.5">*</span>{% endif %}
  </label>
  <textarea
    name="{{ field.get_key() }}"
    rows="{{ field.get_rows() }}"
    {% if field.is_required() %}required{% endif %}
    {% if field.get_placeholder() %}placeholder="{{ field.get_placeholder() }}"{% endif %}
    class="{{ input_class }}"
    style="--tw-ring-color: var(--color-primary-500);"
  >{{ current }}</textarea>
  {% if has_error %}
    <p class="text-xs text-red-600 dark:text-red-400 mt-1">{{ errors[field.get_key()] }}</p>
  {% elif field.get_help_text() %}
    <p class="text-xs text-secondary-400 dark:text-secondary-500 mt-1">{{ field.get_help_text() }}</p>
  {% endif %}
</div>
