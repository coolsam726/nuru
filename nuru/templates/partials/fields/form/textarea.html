<div>
  <label class="block text-sm font-medium text-secondary-700 dark:text-secondary-300 mb-1.5">
    {{ field.label }}
    {% if field.required %}<span class="text-red-500 ml-0.5">*</span>{% endif %}
  </label>
  <textarea
    name="{{ field.key }}"
    rows="{{ field.rows | default(4) }}"
    {% if field.required %}required{% endif %}
    {% if field.placeholder %}placeholder="{{ field.placeholder }}"{% endif %}
    class="{{ input_class }}"
    style="--tw-ring-color: var(--color-primary-500);"
  >{{ current }}</textarea>
  {% if has_error %}
    <p class="text-xs text-red-600 dark:text-red-400 mt-1">{{ errors[field.key] }}</p>
  {% elif field.help_text %}
    <p class="text-xs text-secondary-400 dark:text-secondary-500 mt-1">{{ field.help_text }}</p>
  {% endif %}
</div>
