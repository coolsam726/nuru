<div class="px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-6 {% if not is_last %}border-b border-zinc-100 dark:border-zinc-700{% endif %}">
  <dt class="text-sm font-medium text-zinc-500 dark:text-zinc-400 flex items-center">{{ field.label }}</dt>
  <dd class="mt-1 sm:mt-0 sm:col-span-2 text-sm">
    {% if value %}
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium
                   bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Yes
      </span>
    {% else %}
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium
                   bg-zinc-100 text-zinc-500 dark:bg-zinc-700 dark:text-zinc-400">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        No
      </span>
    {% endif %}
  </dd>
</div>
