<div>
  <label for="{{ field.name }}" class="block text-sm font-medium text-secondary-700 dark:text-secondary-300 mb-1">{{ field.label }}{% if field.required %}<span class="text-red-500 ml-0.5">*</span>{% endif %}</label>

  <div class="relative">
    <div class="absolute inset-y-0 end-0 top-0 flex items-center pe-3.5 pointer-events-none">
      <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
    </div>
    <input
      type="time"
      id="{{ field.name }}"
      name="{{ field.name }}"
      class="block w-full p-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body"
      value="{{ current if current is not none else (value or '') }}"
      {% if field.min_time is defined %}min="{{ field.min_time }}"{% endif %}
      {% if field.max_time is defined %}max="{{ field.max_time }}"{% endif %}
      {% if field.required %}required{% endif %}
    />
  </div>

  {% if has_error %}
    <p class="text-xs text-red-600 dark:text-red-400 mt-1">{{ errors[field.key] }}</p>
  {% elif field.help_text %}
    <p class="text-xs text-secondary-400 dark:text-secondary-500 mt-1">{{ field.help_text }}</p>
  {% endif %}
</div>
